<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dialektik-Kritik-Agent</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      background: #1c1c1e;
      color: #f2f2f0;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      margin-bottom: 0.3rem;
      color: #f2f2f0;
    }

    .subtitle {
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2rem;
    }

    label {
      font-size: 13px;
      color: #888;
      display: block;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      resize: vertical;
      font-size: 15px;
      padding: 10px;
      border-radius: 8px;
      border: 0.5px solid #333;
      background: #2c2c2e;
      color: #f2f2f0;
      font-family: system-ui, sans-serif;
      margin-bottom: 1.5rem;
      box-sizing: border-box;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .control-group {
      flex: 1;
      min-width: 140px;
    }

    select {
      width: 100%;
      font-size: 14px;
      padding: 8px;
      border-radius: 8px;
      border: 0.5px solid #333;
      background: #2c2c2e;
      color: #f2f2f0;
    }

    button {
      font-size: 14px;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 8px;
      border: 0.5px solid #555;
      background: transparent;
      color: #f2f2f0;
      transition: background 0.15s;
    }

    button:hover { background: #2c2c2e; }
    button:disabled { opacity: 0.5; cursor: default; }

    #output-area {
      margin-top: 1.5rem;
      display: none;
    }

    .output-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
    }

    #output-label {
      font-size: 12px;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #output-text {
      font-size: 15px;
      line-height: 1.75;
      color: #f2f2f0;
      border-left: 2px solid #444;
      padding-left: 1rem;
    }

    #output-follow {
      margin-top: 1rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #loading-area {
      margin-top: 1.5rem;
      display: none;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

<h1>Dialektik-Kritik-Agent</h1>
<div class="subtitle">Dialektik der Zapfanlage · Köln-Ehrenfeld</div>

<label>Deine These oder Argument</label>
<textarea id="input-these" rows="5" placeholder="z.B. „Der Naturzustand bei Hobbes ist kein historisches Faktum, sondern ein Gedankenexperiment." – oder eine eigene Beobachtung aus der Diskussion..."></textarea>

<div class="controls">
  <div class="control-group">
    <label>Modus</label>
    <select id="select-modus">
      <option value="kritisch">Kritisches Gegenfeedback</option>
      <option value="anwalt">Advocatus Diaboli</option>
      <option value="sokrates">Sokratisches Nachfragen</option>
      <option value="habermas">Habermas würde sagen...</option>
    </select>
  </div>
  <div class="control-group">
    <label>Schärfe</label>
    <select id="select-schaerfe">
      <option value="sanft">Konstruktiv</option>
      <option value="mittel" selected>Direkt</option>
      <option value="scharf">Schonungslos</option>
    </select>
  </div>
</div>

<button id="btn-submit" onclick="submitThese()">These einreichen →</button>

<div id="output-area">
  <div class="output-header">
    <div class="dot"></div>
    <span id="output-label">Kritischer Agent</span>
  </div>
  <div id="output-text"></div>
  <div id="output-follow"></div>
</div>

<div id="loading-area">Agent denkt nach...</div>

<script>
async function submitThese() {
  const these = document.getElementById('input-these').value.trim();
  if (!these) return;

  const modus = document.getElementById('select-modus').value;
  const schaerfe = document.getElementById('select-schaerfe').value;

  document.getElementById('output-area').style.display = 'none';
  document.getElementById('loading-area').style.display = 'block';
  document.getElementById('btn-submit').disabled = true;

  const modusTexte = {
    kritisch: 'Du bist ein kritischer Gesprächspartner im Kontext eines politisch-philosophischen Lesekreises. Gib konstruktives, pointiertes Gegenfeedback zur vorgetragenen These. Zeige Schwachstellen auf, nenne Gegenbeispiele, stelle die Prämissen in Frage.',
    anwalt: 'Du bist Advocatus Diaboli in einem philosophischen Lesekreis. Verteidige die Gegenposition zur vorgelegten These – überzeugend, intelligent, provokant.',
    sokrates: 'Du bist ein sokratischer Gesprächspartner. Stelle gezielte Rückfragen die die Prämissen der These bloßlegen. Keine Antworten geben – nur Fragen, die zum Weiterdenken zwingen.',
    habermas: 'Du analysierst die vorgetragene These aus der Perspektive von Jürgen Habermas und seiner Theorie des kommunikativen Handelns. Beziehe dich auf seine Konzepte: kommunikatives vs. strategisches Handeln, Geltungsansprüche, Lebenswelt, deliberative Demokratie.'
  };

  const schaerfeTexte = {
    sanft: 'Sei konstruktiv und ermutigend, aber klar in deiner Kritik.',
    mittel: 'Sei direkt und klar, ohne unnötige Schärfe.',
    scharf: 'Sei schonungslos direkt. Spare nicht mit Kritik wenn die These schwach ist.'
  };

  const modusLabel = {
    kritisch: 'Kritisches Gegenfeedback',
    anwalt: 'Advocatus Diaboli',
    sokrates: 'Sokratische Fragen',
    habermas: 'Habermas-Perspektive'
  };

  const systemPrompt = `${modusTexte[modus]} ${schaerfeTexte[schaerfe]} Antworte auf Deutsch, präzise und philosophisch fundiert. Maximal 200 Wörter. Kein Einleitungssatz wie "Gerne" oder "Natürlich".`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        system: systemPrompt,
        messages: [{ role: 'user', content: these }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || 'Keine Antwort erhalten.';

    document.getElementById('output-label').textContent = modusLabel[modus];
    document.getElementById('output-text').textContent = text;
    document.getElementById('output-area').style.display = 'block';

    const follow = document.getElementById('output-follow');
    follow.innerHTML = '';
    ['Gegenargument entwickeln', 'Synthese versuchen', 'Hobbes dazu befragen'].forEach(f => {
      const btn = document.createElement('button');
      btn.textContent = f + ' →';
      btn.onclick = () => {
        document.getElementById('input-these').value = f + ': ' + these;
        submitThese();
      };
      follow.appendChild(btn);
    });

  } catch(e) {
    document.getElementById('output-text').textContent = 'Fehler beim Laden. Bitte erneut versuchen.';
    document.getElementById('output-area').style.display = 'block';
  }

  document.getElementById('loading-area').style.display = 'none';
  document.getElementById('btn-submit').disabled = false;
}
</script>
</body>
</html>
